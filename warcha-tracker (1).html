<style>* { box-sizing: border-box; }
html, body { color: rgb(45, 58, 46); -webkit-font-smoothing: antialiased; direction: rtl; background: linear-gradient(135deg, rgb(245, 241, 232) 0%, rgb(237, 229, 211) 50%, rgb(232, 222, 201) 100%) fixed; max-width: 100vw; min-height: 100vh; margin: 0px; padding: 0px; font-family: "Segoe UI", Tahoma, Cairo, Tajawal, sans-serif; overflow-x: hidden; }
body, input, button, select, textarea, table, td, th, span, div { font-variant-numeric: lining-nums; font-feature-settings: "lnum", "tnum"; }
input[type="date"], input[type="number"], input[type="time"] { text-align: left; font-variant-numeric: lining-nums; font-feature-settings: "lnum"; direction: ltr; }
#root { width: 100%; max-width: 100vw; min-height: 100vh; animation: 0.4s ease 0s 1 normal none running fadeIn; overflow-x: hidden; }
@keyframes fadeIn { 
  0% { opacity: 0; transform: translateY(8px); }
  100% { opacity: 1; transform: translateY(0px); }
}
@keyframes slideIn { 
  0% { opacity: 0; transform: translate(-12px); }
  100% { opacity: 1; transform: translate(0px); }
}
@keyframes scaleIn { 
  0% { opacity: 0; transform: scale(0.95); }
  100% { opacity: 1; transform: scale(1); }
}
@keyframes pulse { 
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}
@keyframes shimmer { 
  0% { background-position: -200% 0px; }
  100% { background-position: 200% 0px; }
}
input, button, select, textarea { font-family: inherit; }
input:focus, select:focus, textarea:focus { border-color: rgb(90, 107, 74) !important; outline: none !important; box-shadow: rgba(90, 107, 74, 0.18) 0px 0px 0px 3px !important; }
button { user-select: none; transition: 0.18s !important; }
button:active { transform: scale(0.97); }
@media (width <= 768px) {
  body, #root { width: 100vw; max-width: 100vw; overflow-x: hidden; }
  * { max-width: 100%; }
  table { font-size: 12px !important; }
  th, td { padding: 6px 4px !important; }
}
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: rgb(235, 229, 214); }
::-webkit-scrollbar-thumb { background: linear-gradient(rgb(169, 153, 119) 0%, rgb(122, 110, 84) 100%); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: linear-gradient(rgb(122, 110, 84) 0%, rgb(90, 78, 58) 100%); }
.glass { background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.4); }
.animate-pulse-slow { animation: 2.5s ease-in-out 0s infinite normal none running pulse; }
.animate-fade-in { animation: 0.4s ease 0s 1 normal none running fadeIn; }
